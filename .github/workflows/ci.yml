name: CI

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set PYTHONPATH early
        run: echo "PYTHONPATH=$(pwd)/.." >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Ensure build tools are available before editable install (PEP 517 builds)
          python -m pip install --upgrade setuptools wheel build
          python -m pip install -r requirements-ci.txt
          # Install editable package so local imports (sistema_ro.*) work
          python -m pip install -e .
          echo "PYTHONPATH=$(pwd)/.." >> $GITHUB_ENV

      - name: Run Python tests
        run: python -m pytest -q

  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci --no-optional
          npm install rollup@^4 --no-optional --no-audit --no-fund

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --silent

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run ruff
        run: |
          ruff check .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci --no-optional
          npm install rollup@^4 --no-optional --no-audit --no-fund

      - name: Run frontend linter
        working-directory: frontend
        run: npm run lint

  debug-install:
    name: Debug: install & python path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set PYTHONPATH early
        run: echo "PYTHONPATH=$(pwd)/.." >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Prepare and install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel build
          python -m pip install -r requirements-ci.txt
          python -m pip install -e .
          echo "PYTHONPATH=$(pwd)/.." >> $GITHUB_ENV

      - name: Debug: pip metadata and sys.path
        run: |
          python -m pip show sistema-ro || true
          python - <<'PY'
import sys, site, inspect, os
print('sys.path:')
for p in sys.path:
    print(' -', p)

print('\nsite.getsitepackages():')
for p in site.getsitepackages():
    print(' -', p)
    try:
        print('   listing:', os.listdir(p)[:30])
    except Exception as e:
        print('   ls error', e)

try:
    import sistema_ro
    print('\nimport sistema_ro succeeded')
    print('file:', inspect.getfile(sistema_ro))
    print('package dir:', os.path.dirname(inspect.getfile(sistema_ro)))
    print('dir listing:', os.listdir(os.path.dirname(inspect.getfile(sistema_ro)))[:50])
except Exception as e:
    print('\nimport sistema_ro failed:', e)
PY

      - name: Debug: locate dist-info and egg-link
        run: |
          python - <<'PY'
import site, os, glob
for p in site.getsitepackages():
    print('Checking', p)
    for pattern in ('sistema_ro*.dist-info','sistema_ro*.egg-info','sistema_ro*.egg-link','sistema-ro*'):
        for f in glob.glob(os.path.join(p,pattern)):
            print(' -', f)
PY
