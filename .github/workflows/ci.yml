name: CI

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pytest httpx

      - name: Debug installed package
        run: |
          python - <<'PY'
          import importlib.util, sys, traceback
          print('Python executable:', sys.executable)
          print('sys.path:')
          for p in sys.path:
              print(' -', p)
          spec = importlib.util.find_spec('sistema_ro')
          print('find_spec(sistema_ro):', spec)
          try:
            import sistema_ro
            print('sistema_ro __file__:', getattr(sistema_ro, '__file__', None))
            # show available paths and files under first search location
            locs = list(spec.submodule_search_locations or [])
            if locs:
              import os
              p = locs[0]
              print('Listing', p)
              try:
                print('\n'.join(os.listdir(p)))
              except Exception as _:
                print('Could not list', p, _)
            # try importing the enums submodule explicitly
            try:
              import importlib
              m = importlib.import_module('sistema_ro.enums')
              print('Imported enums ->', getattr(m, '__file__', None))
            except Exception:
              traceback.print_exc()
          except Exception:
            traceback.print_exc()
          PY

        - name: Show installed package files
        run: |
          echo "=== pip show sistema-ro ==="
          python -m pip show -f sistema-ro || true
          echo "=== site-packages listing for sistema_ro ==="
          python - <<'PY'
          import site, os
          paths = site.getsitepackages() + [site.getusersitepackages()]
          for p in paths:
            target = os.path.join(p, 'sistema_ro')
            if os.path.exists(target):
              print('Found', target)
              for root, dirs, files in os.walk(target):
                print(root)
                for f in files[:10]:
                  print('  ', f)
          PY

      - name: Run Python tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest -q

  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --silent

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run ruff
        run: |
          ruff check .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend linter
        working-directory: frontend
        run: npm run lint
