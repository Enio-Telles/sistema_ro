name: Debug Pytest Collection

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to run the workflow on (branch or commit)'
        required: false
  push:
    branches:
      - main

jobs:
  debug-collection:
    name: Debug: pytest collection + sys.path
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set PYTHONPATH early
        run: echo "PYTHONPATH=$(pwd)/.." >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Prepare and install package
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m pip install -r requirements-ci.txt || true
          python -m pip install . || true
          echo "PYTHONPATH=$(pwd)/.." >> $GITHUB_ENV

      - name: Debug: pip metadata and site packages
        run: |
          python -m pip show sistema-ro || true
          python - <<'PY'
import sys, site, os, glob
print('--- sys.path (inspect) ---')
for p in sys.path:
    print(' -', p)

print('\n--- site.getsitepackages() ---')
for p in site.getsitepackages():
    print(' -', p)
    try:
        print('   listing:', os.listdir(p)[:50])
    except Exception as e:
        print('   ls error', e)

print('\n--- find dist/egg links ---')
for p in site.getsitepackages():
    for pattern in ('sistema_ro*.dist-info','sistema_ro*.egg-info','sistema_ro*.egg-link','sistema-ro*'):
        for f in glob.glob(os.path.join(p,pattern)):
            print(' -', f)

try:
    import sistema_ro
    import inspect
    print('\nimport sistema_ro succeeded')
    print('file:', inspect.getfile(sistema_ro))
    print('package dir:', os.path.dirname(inspect.getfile(sistema_ro)))
    print('dir listing:', os.listdir(os.path.dirname(inspect.getfile(sistema_ro)))[:50])
except Exception as e:
    print('\nimport sistema_ro failed:', e)
PY

      - name: Debug: sys.path before pytest
        run: |
          python - <<'PY'
import sys
print('--- sys.path immediately before pytest ---')
for p in sys.path:
    print(p)
PY

      - name: Save debug info to file
        continue-on-error: true
        run: |
          python - <<'PY'
    import sys, site, os, glob, inspect, traceback
    lines = []
    try:
      lines.append('=== sys.path ===')
      for p in sys.path:
        lines.append(p)
      lines.append('\n=== site.getsitepackages ===')
      for p in site.getsitepackages():
        lines.append(p)
        try:
          lines.append('listing:' + str(os.listdir(p)[:50]))
        except Exception as e:
          lines.append('ls error:' + str(e))
      lines.append('\n=== find dist/egg links ===')
      for p in site.getsitepackages():
        for pattern in ('sistema_ro*.dist-info','sistema_ro*.egg-info','sistema_ro*.egg-link','sistema-ro*'):
          for f in glob.glob(os.path.join(p,pattern)):
            lines.append(f)
      try:
        import sistema_ro
        lines.append('\nimport sistema_ro succeeded')
        lines.append('file:' + inspect.getfile(sistema_ro))
      except Exception as e:
        lines.append('\nimport sistema_ro failed:' + str(e))
    except Exception:
      lines.append('DEBUG SCRIPT FAILED:\n' + traceback.format_exc())
    finally:
      try:
        open('debug_sysinfo.txt','w', encoding='utf-8').write('\n'.join(lines))
      except Exception as e:
        # best-effort write to stdout if file write fails
        print('FAILED TO WRITE debug_sysinfo.txt:', e)
    PY

      - name: Upload debug artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: debug_sysinfo
          path: debug_sysinfo.txt

      - name: Run pytest (canonico only)
        run: |
          python -m pytest tests/canonico -q
